name: Build and Push Docker Image

on:
  push:
    branches: ["main"]

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Build the Docker image
      - name: Build Docker image
        run: |
          echo "Building Docker image..."
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fastapi-app:latest .

      # Step 3: Save the Docker image as an artifact
      - name: Save Docker image
        run: |
          docker save ${{ secrets.DOCKER_USERNAME }}/fastapi-app:latest | gzip > fastapi-app.tar.gz

      # Step 4: Upload the Docker image artifact
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v3
        with:
          name: docker-image
          path: fastapi-app.tar.gz

  push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    steps:
      # Step 1: Checkout code (optional)
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Download the Docker image artifact
      - name: Download Docker image artifact
        uses: actions/download-artifact@v3
        with:
          name: docker-image
          path: .

      # Step 3: Load the Docker image into the runner
      - name: Load Docker image
        run: |
          gunzip -c fastapi-app.tar.gz | docker load
          docker tag ${{ secrets.DOCKER_USERNAME }}/fastapi-app:latest ${{ secrets.DOCKER_USERNAME }}/fastapi-app:latest

      # Step 4: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 5: Push the Docker image
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-app:latest