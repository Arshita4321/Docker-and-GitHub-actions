name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    env:
      DOCKER_USER: ${{ env.DOCKER_USERNAME }}   # environment variable for username
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          echo "Building Docker image..."
          docker build -t $DOCKER_USER/fastapi-app:latest .

  push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    env:
      DOCKER_USER: ${{ env.DOCKER_USERNAME }}   # environment variable for username
      DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}  # keep password secret
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          echo "Pushing Docker image..."
          docker push $DOCKER_USER/fastapi-app:latest